name: iOS Build Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    name: Build MetaMask IPA
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install JavaScript dependencies
        run: |
          set -euo pipefail
          corepack enable
          yarn install --immutable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: false

      - name: Install CocoaPods dependencies
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          bundle install --gemfile=ios/Gemfile
          yarn pod:install

      - name: Generate iOS build files
        run: |
          set -euo pipefail
          cp -n .js.env.example .js.env || true
          cp -n .ios.env.example .ios.env || true
          echo "" > ios/debug.xcconfig
          echo "" > ios/release.xcconfig
          echo "export NODE_BINARY=$(command -v node)" > ios/.xcode.env.local

      - name: Verify CocoaPods workspace
        run: |
          set -euo pipefail
          test -f "ios/Pods/Target Support Files/Pods-MetaMask/Pods-MetaMask.release.xcconfig"
          test -d "ios/branch-ios-sdk"
          test -f "ios/MetaMask.xcworkspace/contents.xcworkspacedata"

      - name: Build MetaMask workspace
        run: |
          set -euo pipefail
          rm -rf ios/build/MetaMask.xcarchive
          xcodebuild -workspace ios/MetaMask.xcworkspace \
            -scheme MetaMask \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            archive -archivePath ios/build/MetaMask.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        run: |
          set -euo pipefail
          rm -rf build
          mkdir -p build/Payload
          
          if [ "false" = "true" ]; then
            APP_PATH=$(find ios/build -name "*.app" -type d | head -n 1)
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | head -n 1)
            fi
            echo "Found App at: $APP_PATH"
            if [ -z "$APP_PATH" ]; then
              echo "Error: no .app bundle was produced."
              exit 1
            fi
            cd "$(dirname "$APP_PATH")"
            zip -r "$GITHUB_WORKSPACE/Project-Simulator.zip" "$(basename "$APP_PATH")"
          else
            ARCHIVE_PATH="ios/build/MetaMask.xcarchive"
            APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" -type d | head -n 1)
            echo "Found App in archive: $APP_PATH"
            if [ -z "$APP_PATH" ]; then
              echo "Error: no .app bundle found inside $ARCHIVE_PATH."
              exit 1
            fi
            cp -r "$APP_PATH" build/Payload/
            cd build && zip -r ../Project-Unsigned.ipa Payload
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Project-Real-Unsigned
          path: Project-Unsigned.ipa
